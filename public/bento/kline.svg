<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="140" fill="url(#grad)" />
  <g transform="translate(128, 128) scale(10.6)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Candle 1 (Bullish green-like, colored white for contrast) -->
    <line x1="6" y1="3" x2="6" y2="21" stroke="#22c55e" stroke-width="1.8" />
    <rect x="4" y="6" width="4" height="10" rx="1" fill="#22c55e" stroke="none" />
    <!-- Candle 2 (Bearish red-like) -->
    <line x1="12" y1="1" x2="12" y2="19" stroke="#ef4444" stroke-width="1.8" />
    <rect x="10" y="4" width="4" height="9" rx="1" fill="#ef4444" stroke="none" />
    <!-- Candle 3 (Bullish) -->
    <line x1="18" y1="5" x2="18" y2="23" stroke="#22c55e" stroke-width="1.8" />
    <rect x="16" y="9" width="4" height="8" rx="1" fill="#22c55e" stroke="none" />
  </g>
</svg>
