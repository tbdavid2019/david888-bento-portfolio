<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="destGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0.5" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Card -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#destGradient)"/>
  <rect x="1" y="1" width="30" height="30" rx="6" ry="6" fill="none" stroke="white" stroke-opacity="0.15"/>
  
  <!-- Outer glowing rings/dots (radar/tracing look) -->
  <circle cx="8" cy="24" r="1.5" fill="white" opacity="0.4" />
  <circle cx="16" cy="12" r="1.5" fill="white" opacity="0.6" />
  <circle cx="24" cy="18" r="2.2" fill="white" opacity="0.9" filter="url(#shadow)" />
  <circle cx="24" cy="18" r="0.8" fill="#0f766e" />

  <!-- Paths connecting the redirect chain -->
  <path d="M8 24 Q 12 18 16 12" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="2 1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M16 12 Q 20 15 24 18" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" filter="url(#shadow)" />

  <!-- Direction indicator arrows -->
  <!-- Arrow at point 2 (16,12) pointing towards it -->
  <path d="M12.5 13.5 L16 12 L15.5 16" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />
  <!-- Arrow at point 3 (24,18) pointing towards target -->
  <path d="M21 16.2 L24 18 L22 20.8" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
</svg>
