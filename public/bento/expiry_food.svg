<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="140" fill="url(#grad)" />
  <g transform="translate(128, 128) scale(10.6)" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Plate -->
    <line x1="2" y1="20" x2="22" y2="20" stroke-width="2" />
    <!-- Cloche (food cover dome) -->
    <path d="M5 20A7 7 0 0 1 19 20" />
    <path d="M12 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" fill="white" />
    <!-- Clock/Timer inside plate representing limited time/expiry -->
    <circle cx="12" cy="14" r="3.5" />
    <polyline points="12,12.2 12,14 13.5,14" />
  </g>
</svg>
